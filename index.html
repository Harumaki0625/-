<!DOCTYPE html>  
<html lang="ja">  
<head>  
  <meta charset="UTF-8" />  
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />  
  <title>勤務カレンダー</title>  
  
  <!-- PWA（不要なら削除OK） -->  
  <link rel="manifest" href="./manifest.json">  
  <meta name="theme-color" content="#4e73df" />  
  
  <style>  
    body{font-family:Meiryo,sans-serif;background:#f5f7fa;margin:20px;}  
    h1{text-align:center;}  
  
    .toolbar{  
      width:1200px;margin:auto;margin-bottom:20px;background:#fff;padding:15px;border-radius:8px;  
      box-shadow:0 2px 5px rgba(0,0,0,.1);display:flex;gap:10px;align-items:center;flex-wrap:wrap;  
    }  
    .toolbar button{padding:8px 15px;cursor:pointer;}  
    .toolbar .status{  
      margin-left:auto;font-size:12px;color:#333;opacity:.9;max-width:620px;  
      white-space:nowrap;overflow:hidden;text-overflow:ellipsis;  
    }  
  
    .calendar-header{  
      display:flex;justify-content:center;align-items:center;gap:16px;margin-bottom:15px;flex-wrap:wrap;  
    }  
    .month-title{font-size:28px;font-weight:bold;min-width:250px;text-align:center;}  
  
    .icon-btn{  
      padding:10px 14px;  
      cursor:pointer;  
      border:none;  
      background:#ddd;  
      border-radius:8px;  
      font-size:18px;  
      line-height:1;  
    }  
    .icon-btn:hover{ background:#cfcfcf; }  
    .icon-btn[disabled]{ opacity:.5; cursor:not-allowed; }  
  
    #adminControls { display:none; gap:8px; align-items:center; }  
    #adminControls input[type="month"]{padding:6px 8px;}  
  
    .calendar-wrap{width:1200px;margin:auto;}  
    table{width:100%;border-collapse:collapse;table-layout:fixed;background:#fff;}  
  
    /* 曜日見出し */  
    th{background:#9e9e9e;color:white;padding:8px;} /* 月〜金はグレー */  
    th.sun{background:#d32f2f;} /* 日：赤 */  
    th.sat{background:#1976d2;} /* 土：青 */  
  
    /* 日付セル（本体） */  
    td{  
      border:1px solid #ccc;  
      height:180px;  
      vertical-align:top;  
      padding:4px;  
      background:#fff; /* ★月〜金は基本「白」 */  
    }  
  
    /* ★日付が割り当てられていないセルだけ薄い灰色 */  
    td.empty{ background:#f2f2f2; }  
  
    /* 土日だけ色を付ける */  
    td.sat{ background:#e3f2fd; }     /* 土：薄い青 */  
    td.sun{ background:#ffebee; }     /* 日：薄い赤 */  
  
    .today{outline:3px solid orange;}  
    .day-number{font-size:16px;font-weight:bold;margin-bottom:3px;}  
    .event-container{height:145px;overflow-y:auto;}  
    .event-container::-webkit-scrollbar{width:6px;}  
    .event-container::-webkit-scrollbar-thumb{background:#888;border-radius:4px;}  
  
    .global-event{background:#fff176;border:1px solid #fbc02d;border-radius:4px;padding:3px;margin-bottom:3px;font-size:12px;font-weight:bold;cursor:pointer;}  
    .work-event{padding:3px;margin-bottom:3px;border-radius:4px;font-size:12px;cursor:pointer;}  
    .shift1{background:#dbeafe;}  
    .shift2{background:#dcfce7;}  
  
    #workModal,#eventModal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);}  
    .modal-content{background:#fff;width:350px;padding:20px;border-radius:10px;margin:120px auto;}  
    .modal-content input[type=text],.modal-content input[type=date]{width:100%;box-sizing:border-box;padding:8px;margin-bottom:10px;}  
    .modal-content button{margin-right:10px;}  
  
    .note{width:1200px;margin:10px auto 0;color:#444;font-size:12px;opacity:.9;line-height:1.6;}  
    code{background:#eee;padding:2px 4px;border-radius:4px;}  
  </style>  
</head>  
  
<body>  
  <h1>勤務カレンダー</h1>  
  
  <div class="toolbar">  
    <!-- ★ JSON未設定時は無効化するのでID付与 -->  
    <button id="btnEvent" onclick="openEventModal()">イベント登録</button>  
  
    <!-- 管理者（簡易） -->  
    <button onclick="adminLogin()">管理者ログイン</button>  
    <button onclick="adminLogout()">ログアウト</button>  
  
    <!-- 共有JSON運用：Open→読み込み→以後自動上書き -->  
    <button onclick="openJsonFileFromShare()">共有JSONファイルを開く</button>  
    <button onclick="importJsonNow()">JSONを再読み込み</button>  
  
    <div class="status" id="jsonStatus">JSON: 未設定</div>  
  </div>  
  
  <div class="calendar-header">  
    <button id="btnPrev" class="icon-btn" onclick="showPrevMonth()" title="前月">←</button>  
    <button id="btnThis" class="icon-btn" onclick="showThisMonth()" title="今月へ戻る">今月</button>  
    <div id="monthTitle" class="month-title"></div>  
    <button id="btnNext" class="icon-btn" onclick="showNextMonth()" title="翌月">→</button>  
  
    <!-- 管理者のみ表示 -->  
    <span id="adminControls">  
      <input type="month" id="monthPicker">  
      <button onclick="jumpToMonth()">月へ移動</button>  
    </span>  
  </div>  
  
  <div class="calendar-wrap">  
    <div id="calendar"></div>  
  </div>  
  
  <div class="note">  
    勤務登録: 日付セルを <b>ダブルクリック</b><br>  
    削除: 登録済み項目をクリック<br>  
    共有フォルダJSON: 最初に各PCで1回だけ「共有JSONを開く」が必要（ブラウザ仕様）。以後は変更のたびに自動上書き。<br>  
    管理者: ログインすると任意月（例: 9月/10月）へ移動できます（簡易パスワード）。<br>  
    <b>Enterキー:</b> 勤務登録/イベント登録フォームでEnter押下で「登録」します（textarea等が無い前提）。<br>  
    <b>※共有JSONが読み込まれていない間は、イベント登録・勤務(有給)登録はできません。</b>  
  </div>  
  
  <!-- 勤務登録 -->  
  <div id="workModal">  
    <div class="modal-content">  
      <h3>勤務登録</h3>  
  
      <!-- ★ form化：Enterでsubmit → saveWork() -->  
      <form id="workForm">  
        <input type="text" id="workDate" readonly>  
        <input type="text" id="employeeName" placeholder="名前">  
  
        <label>  
          <input type="radio" name="shift" value="1直" checked> 1直  
        </label>  
        <label style="margin-left:20px;">  
          <input type="radio" name="shift" value="2直"> 2直  
        </label>  
        <br><br>  
  
        <button type="submit">登録</button>  
        <button type="button" onclick="closeWorkModal()">閉じる</button>  
      </form>  
    </div>  
  </div>  
  
  <!-- イベント登録 -->  
  <div id="eventModal">  
    <div class="modal-content">  
      <h3>イベント登録</h3>  
  
      <!-- ★ form化：Enterでsubmit → saveGlobalEvent() -->  
      <form id="eventForm">  
        <input type="text" id="globalEventName" placeholder="イベント名">  
  
        <label>開始日</label>  
        <input type="date" id="eventStart">  
  
        <label>終了日</label>  
        <input type="date" id="eventEnd">  
  
        <button type="submit">登録</button>  
        <button type="button" onclick="closeEventModal()">閉じる</button>  
      </form>  
    </div>  
  </div>  
  
  <script>  
    /* ---------------------------  
      PWA: service worker登録（不要なら削除OK）  
    ----------------------------*/  
    if ("serviceWorker" in navigator) {  
      navigator.serviceWorker.register("./sw.js").catch(console.error);  
    }  
  
    /* ---------------------------  
      管理者（簡易パスワード）  
      ※フロント埋め込みのため強固な認証ではありません  
    ----------------------------*/  
    const ADMIN_PASSWORD = "Today123"; // 簡易パスワード（必要に応じて変更）  
    function isAdmin() {  
      return sessionStorage.getItem("isAdmin") === "1";  
    }  
  
    function updateAdminUi() {  
      document.getElementById("adminControls").style.display = isAdmin() ? "inline-flex" : "none";  
      updateNavButtons();  
    }  
  
    function adminLogin() {  
      const pw = prompt("管理者パスワードを入力してください");  
      if (pw === null) return;  
      if (pw === ADMIN_PASSWORD) {  
        sessionStorage.setItem("isAdmin", "1");  
        updateAdminUi();  
        alert("管理者モードになりました");  
      } else {  
        alert("パスワードが違います");  
      }  
    }  
  
    function adminLogout() {  
      sessionStorage.removeItem("isAdmin");  
      showThisMonth();  
      updateAdminUi();  
    }  
  
    /* ---------------------------  
      カレンダー本体  
    ----------------------------*/  
    const today = new Date();  
  
    const thisMonthStart = new Date(today.getFullYear(), today.getMonth(), 1);  
    const nextMonthStart = new Date(today.getFullYear(), today.getMonth() + 1, 1);  
  
    let viewDate = new Date(thisMonthStart);  
  
    // データ本体（localStorageは「保険」程度に残す）  
    let works = JSON.parse(localStorage.getItem("works")) || {};  
    let globalEvents = JSON.parse(localStorage.getItem("globalEvents")) || [];  
  
    function newId() {  
      if (crypto?.randomUUID) return crypto.randomUUID();  
      return "id-" + Date.now() + "-" + Math.random().toString(16).slice(2);  
    }  
  
    function normalizeData() {  
      for (const dateKey of Object.keys(works || {})) {  
        works[dateKey] = (works[dateKey] || []).map(w => ({  
          id: w.id || newId(),  
          name: w.name ?? "",  
          shift: w.shift ?? "1直"  
        }));  
      }  
  
      globalEvents = (globalEvents || []).map(g => ({  
        id: g.id || newId(),  
        name: g.name ?? "",  
        start: g.start ?? "",  
        end: g.end ?? ""  
      }));  
    }  
  
    function saveStorage() {  
      localStorage.setItem("works", JSON.stringify(works));  
      localStorage.setItem("globalEvents", JSON.stringify(globalEvents));  
    }  
  
    function clampViewDateIfNeeded() {  
      if (isAdmin()) return;  
      const cur = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getTime();  
      const t0 = thisMonthStart.getTime();  
      const t1 = nextMonthStart.getTime();  
      if (cur !== t0 && cur !== t1) {  
        viewDate = new Date(thisMonthStart);  
      }  
    }  
  
    function updateNavButtons() {  
      const btnPrev = document.getElementById("btnPrev");  
      const btnNext = document.getElementById("btnNext");  
  
      if (isAdmin()) {  
        btnPrev.disabled = false;  
        btnNext.disabled = false;  
        return;  
      }  
  
      const cur = new Date(viewDate.getFullYear(), viewDate.getMonth(), 1).getTime();  
      btnPrev.disabled = (cur === thisMonthStart.getTime());  
      btnNext.disabled = (cur === nextMonthStart.getTime());  
    }  
  
    function showThisMonth() {  
      viewDate = new Date(thisMonthStart);  
      renderCalendar();  
    }  
  
    function showPrevMonth() {  
      if (!isAdmin()) {  
        viewDate = new Date(thisMonthStart);  
        renderCalendar();  
        return;  
      }  
      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() - 1, 1);  
      renderCalendar();  
    }  
  
    function showNextMonth() {  
      if (!isAdmin()) {  
        viewDate = new Date(nextMonthStart);  
        renderCalendar();  
        return;  
      }  
      viewDate = new Date(viewDate.getFullYear(), viewDate.getMonth() + 1, 1);  
      renderCalendar();  
    }  
  
    function jumpToMonth() {  
      if (!isAdmin()) return;  
  
      const v = document.getElementById("monthPicker").value; // "YYYY-MM"  
      if (!v) return;  
      const [y, m] = v.split("-").map(Number);  
      viewDate = new Date(y, m - 1, 1);  
      renderCalendar();  
    }  
  
    /* ============================================================  
      ★追加：JSONが読み込まれていないと登録できないようにする  
      - 判定：jsonFileHandle があること（=共有JSONを開いた/復元できた）  
      - UI：イベント登録ボタン無効化、勤務登録(ダブルクリック)もブロック  
    ============================================================ */  
    function isJsonReady() {  
      return !!jsonFileHandle;  
    }  
  
    function updateJsonDependentUi() {  
      const disabled = !isJsonReady();  
  
      // イベント登録ボタンを無効化  
      const btnEvent = document.getElementById("btnEvent");  
      if (btnEvent) btnEvent.disabled = disabled;  
    }  
  
    function requireJsonOrAlert(actionName) {  
      if (isJsonReady()) return true;  
      alert(`共有JSONファイルが読み込まれていないため、${actionName}はできません。\n先に「共有JSONファイルを開く」を実行してください。`);  
      return false;  
    }  
  
    function openWorkModal(date) {  
      // ★追加：JSON未読込ならブロック  
      if (!requireJsonOrAlert("勤務(有給)登録")) return;  
  
      document.getElementById("workDate").value = date;  
      document.getElementById("employeeName").value = "";  
      document.getElementById("workModal").style.display = "block";  
  
      // ★ 開いたら名前にフォーカス（Enter登録が使いやすい）  
      setTimeout(() => document.getElementById("employeeName").focus(), 0);  
    }  
    function closeWorkModal() { document.getElementById("workModal").style.display = "none"; }  
  
    function openEventModal() {  
      // ★追加：JSON未読込ならブロック  
      if (!requireJsonOrAlert("イベント登録")) return;  
  
      document.getElementById("eventModal").style.display = "block";  
      setTimeout(() => document.getElementById("globalEventName").focus(), 0);  
    }  
    function closeEventModal() { document.getElementById("eventModal").style.display = "none"; }  
  
    /* ============================================================  
      競合緩和の要：保存直前に「最新読込→変更→保存」を直列で実行  
    ============================================================ */  
    let syncQueue = Promise.resolve();  
    function enqueueSync(task) {  
      syncQueue = syncQueue.then(task, task);  
      return syncQueue;  
    }  
  
    async function syncAndMutate(mutator, reason) {  
      return enqueueSync(async () => {  
        // 共有JSONがある場合は、変更前に必ず最新を取り込む  
        if (jsonFileHandle) {  
          try {  
            await readJsonFromHandleToMemoryOnly();  
          } catch (e) {  
            console.warn(e);  
            setJsonStatus("最新読込に失敗（ローカルで継続）");  
          }  
        }  
  
        // 最新状態に対して変更を適用  
        mutator();  
  
        // 正規化・保存・描画・共有JSONへ上書き  
        normalizeData();  
        saveStorage();  
        renderCalendar();  
        await exportJsonAuto(reason);  
      });  
    }  
  
    /* ---------------------------  
      追加/削除（syncAndMutate経由に変更）  
    ----------------------------*/  
    function saveWork() {  
      // ★念のため（モーダルを直接開かれたケース等にも備える）  
      if (!requireJsonOrAlert("勤務(有給)登録")) return;  
  
      const date = document.getElementById("workDate").value;  
      const name = document.getElementById("employeeName").value.trim();  
      const shift = document.querySelector('input[name="shift"]:checked').value;  
  
      if (!name) { alert("名前を入力してください"); return; }  
  
      closeWorkModal();  
  
      syncAndMutate(() => {  
        if (!works[date]) works[date] = [];  
        works[date].push({ id: newId(), name, shift });  
      }, "saveWork");  
    }  
  
    function saveGlobalEvent() {  
      // ★念のため  
      if (!requireJsonOrAlert("イベント登録")) return;  
  
      const name = document.getElementById("globalEventName").value.trim();  
      const start = document.getElementById("eventStart").value;  
      const end = document.getElementById("eventEnd").value;  
  
      if (!name || !start || !end) { alert("入力してください"); return; }  
      if (start > end) { alert("開始日 <= 終了日にしてください"); return; }  
  
      closeEventModal();  
  
      syncAndMutate(() => {  
        globalEvents.push({ id: newId(), name, start, end });  
      }, "saveGlobalEvent");  
    }  
  
    function renderGlobalEvents(dateKey) {  
      let html = "";  
      globalEvents.forEach((g) => {  
        if (dateKey >= g.start && dateKey <= g.end) {  
          html += `  
            <div class="global-event" onclick="deleteGlobalEvent(event,'${g.id}')">  
              ${escapeHtml(g.name)}  
            </div>`;  
        }  
      });  
      return html;  
    }  
  
    function renderWorks(dateKey) {  
      if (!works[dateKey]) return "";  
  
      const shiftOrder = { "1直": 0, "2直": 1 };  
      const sorted = works[dateKey].slice().sort((a, b) => {  
        return (shiftOrder[a.shift] ?? 99) - (shiftOrder[b.shift] ?? 99);  
      });  
  
      return sorted.map((w) => {  
        const cls = (w.shift === "1直") ? "shift1" : "shift2";  
        return `  
          <div class="work-event ${cls}" onclick="deleteWorkById(event,'${dateKey}','${w.id}')">  
            ${escapeHtml(w.name)} (${escapeHtml(w.shift)})  
          </div>`;  
      }).join("");  
    }  
  
    function deleteWorkById(e, date, id) {  
      e.stopPropagation();  
      if (!confirm("申請を削除しますか？")) return;  
  
      syncAndMutate(() => {  
        works[date] = (works[date] || []).filter(w => w.id !== id);  
        if (works[date].length === 0) delete works[date];  
      }, "deleteWorkById");  
    }  
  
    function deleteGlobalEvent(e, id) {  
      e.stopPropagation();  
      if (!confirm("イベントを削除しますか？")) return;  
  
      syncAndMutate(() => {  
        globalEvents = (globalEvents || []).filter(g => g.id !== id);  
      }, "deleteGlobalEvent");  
    }  
  
    function renderCalendar() {  
      clampViewDateIfNeeded();  
  
      const viewYear = viewDate.getFullYear();  
      const viewMonth = viewDate.getMonth();  
  
      document.getElementById("monthTitle").textContent = `${viewYear}年 ${viewMonth + 1}月`;  
  
      const firstDay = new Date(viewYear, viewMonth, 1);  
      const lastDay = new Date(viewYear, viewMonth + 1, 0);  
  
      let html = `  
        <table>  
          <tr>  
            <th class="sun">日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th class="sat">土</th>  
          </tr>  
          <tr>`;  
  
      let startDay = firstDay.getDay(); // 0=日...6=土  
  
      // ★ 前月側の空白セル：emptyで薄灰  
      for (let i = 0; i < startDay; i++) html += '<td class="empty"></td>';  
  
      for (let day = 1; day <= lastDay.getDate(); day++) {  
        const dateKey = `${viewYear}-${String(viewMonth + 1).padStart(2, '0')}-${String(day).padStart(2, '0')}`;  
  
        if ((startDay + day - 1) % 7 === 0 && day !== 1) html += "</tr><tr>";  
  
        let classes = [];  
        const dow = new Date(viewYear, viewMonth, day).getDay(); // 0=日,6=土  
        if (dow === 0) classes.push("sun");  
        else if (dow === 6) classes.push("sat");  
  
        // ★ weekdayクラスは付けない（＝白のまま）  
  
        if (today.getFullYear() === viewYear && today.getMonth() === viewMonth && today.getDate() === day) {  
          classes.push("today");  
        }  
  
        const tdClass = classes.join(" ");  
  
        html += `  
          <td class="${tdClass}" ondblclick="openWorkModal('${dateKey}')">  
            <div class="day-number">${day}</div>  
            <div class="event-container">  
              ${renderGlobalEvents(dateKey)}  
              ${renderWorks(dateKey)}  
            </div>  
          </td>`;  
      }  
  
      // ★ 翌月側の空白セルも埋める（emptyで薄灰）  
      const totalCells = startDay + lastDay.getDate();  
      const remain = (7 - (totalCells % 7)) % 7;  
      for (let i = 0; i < remain; i++) html += '<td class="empty"></td>';  
  
      html += "</tr></table>";  
      document.getElementById("calendar").innerHTML = html;  
  
      updateNavButtons();  
    }  
  
    function escapeHtml(s) {  
      return String(s).replace(/[&<>"']/g, (c) => ({  
        "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;"  
      }[c]));  
    }  
  
    /* ---------------------------  
      ★ Enterキーで登録（フォームsubmitで実現）  
    ----------------------------*/  
    function setupEnterSubmit() {  
      const workForm = document.getElementById("workForm");  
      const eventForm = document.getElementById("eventForm");  
  
      if (workForm) {  
        workForm.addEventListener("submit", (e) => {  
          e.preventDefault();  
          saveWork();  
        });  
      }  
  
      if (eventForm) {  
        eventForm.addEventListener("submit", (e) => {  
          e.preventDefault();  
          saveGlobalEvent();  
        });  
      }  
    }  
  
    /* ---------------------------  
      共有JSON：読み込み/自動上書き（File System Access API）  
      + ハンドルをIndexedDBに保存（同一PC/同一ブラウザのみ復元可能）  
    ----------------------------*/  
    const HANDLE_DB = "work-calendar-db";  
    const HANDLE_STORE = "handles";  
    const JSON_HANDLE_ID = "jsonFileHandle_v1";  
    let jsonFileHandle = null;  
  
    function setJsonStatus(msg) {  
      document.getElementById("jsonStatus").textContent = "JSON: " + msg;  
    }  
  
    function openHandleDb() {  
      return new Promise((resolve, reject) => {  
        const req = indexedDB.open(HANDLE_DB, 1);  
        req.onupgradeneeded = () => {  
          const db = req.result;  
          if (!db.objectStoreNames.contains(HANDLE_STORE)) {  
            db.createObjectStore(HANDLE_STORE);  
          }  
        };  
        req.onsuccess = () => resolve(req.result);  
        req.onerror = () => reject(req.error);  
      });  
    }  
  
    async function saveHandleToIdb(handle) {  
      const db = await openHandleDb();  
      return new Promise((resolve, reject) => {  
        const tx = db.transaction(HANDLE_STORE, "readwrite");  
        tx.objectStore(HANDLE_STORE).put(handle, JSON_HANDLE_ID);  
        tx.oncomplete = () => resolve();  
        tx.onerror = () => reject(tx.error);  
      });  
    }  
  
    async function loadHandleFromIdb() {  
      const db = await openHandleDb();  
      return new Promise((resolve, reject) => {  
        const tx = db.transaction(HANDLE_STORE, "readonly");  
        const req = tx.objectStore(HANDLE_STORE).get(JSON_HANDLE_ID);  
        req.onsuccess = () => resolve(req.result || null);  
        req.onerror = () => reject(req.error);  
      });  
    }  
  
    function buildJsonText() {  
      const obj = {  
        version: 2,  
        updatedAt: new Date().toISOString(),  
        works,  
        globalEvents  
      };  
      return JSON.stringify(obj, null, 2);  
    }  
  
    async function ensureRwPermission(handle) {  
      if (!handle) return false;  
      if (!handle.queryPermission) return true;  
  
      const perm = await handle.queryPermission({ mode: "readwrite" });  
      if (perm === "granted") return true;  
  
      const req = await handle.requestPermission({ mode: "readwrite" });  
      return req === "granted";  
    }  
  
    // ★「読み込みだけ」版（競合緩和のために追加）  
    async function readJsonFromHandleToMemoryOnly() {  
      const ok = await ensureRwPermission(jsonFileHandle);  
      if (!ok) throw new Error("permission denied");  
  
      const file = await jsonFileHandle.getFile();  
      const text = await file.text();  
  
      if (!text.trim()) {  
        works = {};  
        globalEvents = [];  
      } else {  
        const obj = JSON.parse(text);  
        works = obj?.works || {};  
        globalEvents = obj?.globalEvents || [];  
      }  
  
      normalizeData();  
      saveStorage();  
    }  
  
    // 画面にも反映したいときの読み込み（ボタン「再読み込み」用）  
    async function readJsonFromHandle() {  
      await readJsonFromHandleToMemoryOnly();  
      renderCalendar();  
    }  
  
    async function writeJsonToHandle(text) {  
      const writable = await jsonFileHandle.createWritable({ keepExistingData: false });  
      await writable.write(text);  
      await writable.close();  
    }  
  
    async function exportJsonAuto(reason) {  
      if (!jsonFileHandle) {  
        setJsonStatus("未設定（共有JSONを開くと自動上書き）");  
        return;  
      }  
      try {  
        const ok = await ensureRwPermission(jsonFileHandle);  
        if (!ok) {  
          setJsonStatus("権限なし（保存できません）");  
          return;  
        }  
        await writeJsonToHandle(buildJsonText());  
        setJsonStatus(`上書き保存（${new Date().toLocaleString()} / ${reason}）`);  
      } catch (e) {  
        console.error(e);  
        setJsonStatus("保存失敗（共有フォルダ権限/ファイルを確認。必要なら開き直し）");  
      }  
    }  
  
    async function importJsonNow() {  
      if (!jsonFileHandle) {  
        alert("先に「共有JSONを開く」を押して、共有フォルダのJSONを選んでください。");  
        return;  
      }  
      try {  
        await readJsonFromHandle();  
        setJsonStatus(`再読み込み（${new Date().toLocaleString()}）`);  
        updateJsonDependentUi(); // ★追加  
      } catch (e) {  
        console.error(e);  
        setJsonStatus("読み込み失敗（権限/JSON形式を確認）");  
        alert("読み込みに失敗しました。JSON形式・権限・共有フォルダのアクセス可否を確認してください。");  
        updateJsonDependentUi(); // ★追加  
      }  
    }  
  
    async function openJsonFileFromShare() {  
      if (!("showOpenFilePicker" in window)) {  
        alert("この環境では使えません（File System Access API非対応）。");  
        return;  
      }  
      try {  
        const [handle] = await window.showOpenFilePicker({  
          multiple: false,  
          types: [{  
            description: "JSON",  
            accept: { "application/json": [".json"] }  
          }]  
        });  
  
        jsonFileHandle = handle;  
        await saveHandleToIdb(jsonFileHandle);  
  
        await readJsonFromHandle();  
        setJsonStatus("共有JSONを開きました（以後自動上書き）");  
        updateJsonDependentUi(); // ★追加  
      } catch (e) {  
        console.warn(e);  
        updateJsonDependentUi(); // ★追加  
      }  
    }  
  
    async function loadSavedHandleAndAutoRead() {  
      try {  
        if (!("showOpenFilePicker" in window)) {  
          setJsonStatus("この環境では自動保存不可");  
          updateJsonDependentUi(); // ★追加  
          return;  
        }  
        jsonFileHandle = await loadHandleFromIdb();  
        if (jsonFileHandle) {  
          setJsonStatus("保存先復元（読み込み中…）");  
          await readJsonFromHandle();  
          setJsonStatus("保存先復元済み（自動読み込み完了・以後自動上書き）");  
        } else {  
          setJsonStatus("未設定（共有JSONを開くと自動上書き）");  
        }  
        updateJsonDependentUi(); // ★追加  
      } catch (e) {  
        console.warn(e);  
        setJsonStatus("保存先復元/読み込み失敗（共有JSONを開き直してください）");  
        updateJsonDependentUi(); // ★追加  
      }  
    }  
  
    /* 初期化 */  
    normalizeData();  
    saveStorage();  
    updateAdminUi();  
    renderCalendar();  
    setupEnterSubmit();  
  
    // ★初期は未設定なので登録UIを止める  
    updateJsonDependentUi();  
  
    loadSavedHandleAndAutoRead();  
  </script>  
</body>  
</html>
